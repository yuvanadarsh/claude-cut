version: '3.8'
services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
      - ${CLIPS_BASE_PATH}:${CLIPS_BASE_PATH}
    environment:
      - NODE_ENV=development
    command: npm run dev
